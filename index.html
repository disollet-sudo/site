<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--verde:#1D9E75;--verde-lt:#E1F5EE;--verde-dk:#0F6E56;--cinza:#f4f4f2;--borda:#e0dfd8;--texto:#1a1a18;--sub:#6b6b65;--branco:#fff;--promo:#E24B4A}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cinza);color:var(--texto);font-size:14px;line-height:1.5;padding-bottom:80px}
header{background:#000;border-bottom:1px solid #222;padding:12px 20px;position:sticky;top:0;z-index:200}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{height:28px;display:block}
.container{max-width:1200px;margin:20px auto;padding:0 16px}
.produtos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
@media(min-width:768px){.produtos-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}}
.card{background:var(--branco);border:1px solid var(--borda);border-radius:8px;padding:12px;display:flex;flex-direction:column;position:relative;justify-content:space-between;transition:transform 0.2s}
.card:active{transform:scale(0.98)}
.badge-promo{position:absolute;top:8px;left:8px;background:var(--promo);color:var(--branco);font-size:10px;font-weight:bold;padding:2px 6px;border-radius:4px;z-index:10}
.card-img-wrapper{width:100%;height:120px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:6px;overflow:hidden;position:relative}
@media(min-width:768px){.card-img-wrapper{height:160px}}
.card-img{max-width:100%;max-height:100%;object-fit:contain}
.card-info{flex-grow:1;display:flex;flex-direction:column;justify-content:flex-end}
.prod-cod{font-size:11px;color:var(--sub);margin-bottom:2px}
.prod-nome{font-size:13px;font-weight:600;color:var(--texto);margin-bottom:6px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:34px}
.prod-emb{font-size:11px;color:var(--sub);margin-bottom:6px}
.prod-preco{font-size:16px;font-weight:700;color:var(--verde-dk);margin-bottom:10px}
.btn-add{background:var(--verde);color:var(--branco);border:none;border-radius:6px;padding:8px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;width:100%;transition:background 0.2s}
.btn-add:hover{background:var(--verde-dk)}
.btn-cart{background:var(--verde);color:var(--branco);border:none;border-radius:50%;width:56px;height:56px;position:fixed;bottom:20px;right:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,0.2);cursor:pointer;z-index:190;transition:transform 0.2s}
.btn-cart:active{transform:scale(0.9)}
.cart-count{background:var(--promo);color:var(--branco);font-size:11px;font-weight:bold;border-radius:10px;padding:2px 6px;position:absolute;top:-4px;right:-4px;border:2px solid var(--verde)}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:300;padding:16px}
.modal.open{display:flex}
.modal-content{background:var(--branco);border-radius:12px;width:100%;max-width:500px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 10px 25px rgba(0,0,0,0.3);animation:modIn 0.3s ease-out}
@keyframes modIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:700}
.btn-close{background:none;border:none;font-size:24px;color:var(--sub);cursor:pointer;line-height:1}
.modal-body{padding:20px;overflow-y:auto;flex-grow:1}
.modal-footer{padding:16px 20px;border-top:1px solid var(--borda);display:flex;gap:12px;justify-content:flex-end}
.btn-sec{background:var(--cinza);color:var(--texto);border:1px solid var(--borda);border-radius:6px;padding:10px 16px;font-weight:bold;cursor:pointer;font-size:14px}
.btn-pri{background:var(--verde);color:var(--branco);border:none;border-radius:6px;padding:10px 16px;font-weight:bold;cursor:pointer;font-size:14px}
.btn-pri:hover{background:var(--verde-dk)}
.carrinho-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--borda)}
.carrinho-item:last-child{border-bottom:none}
.carrinho-item-info{flex-grow:1}
.carrinho-item-nome{font-weight:600;font-size:13px;margin-bottom:4px}
.carrinho-item-meta{font-size:11px;color:var(--sub)}
.qtd-control{display:flex;align-items:center;gap:4px}
.btn-qtd{background:var(--cinza);border:1px solid var(--borda);width:28px;height:28px;border-radius:4px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qtd-val{width:32px;text-align:center;font-weight:bold;font-size:13px}
.cart-tot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:2px solid var(--borda);font-weight:bold;font-size:16px;color:var(--verde-dk)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px;border:1px solid var(--borda);border-radius:6px;font-size:14px;background:var(--branco);color:var(--texto);outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--verde)}
.sel-cl-box{border:1px dashed var(--verde);background:var(--verde-lt);border-radius:6px;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:600;color:var(--verde-dk);transition:background 0.2s}
.sel-cl-box:hover{background:#d2f0e5}
.bottom-sheet{position:fixed;bottom:0;left:0;width:100%;background:var(--branco);border-top-left-radius:16px;border-top-right-radius:16px;box-shadow:0 -5px 20px rgba(0,0,0,0.15);transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);z-index:400;max-height:80vh;display:flex;flex-direction:column}
.bottom-sheet.open{transform:translateY(0)}
.sheet-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:390}
.sheet-overlay.open{display:block}
.sheet-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--borda)}
.sheet-header h3{font-size:15px;font-weight:700}
.btn-close-sheet{background:none;border:none;font-size:24px;color:var(--sub);cursor:pointer}
.lista-clientes{overflow-y:auto;flex-grow:1;padding:0 20px 20px 20px}
.cliente-item{padding:12px;border-bottom:1px solid var(--borda);cursor:pointer;transition:background 0.1s;border-radius:4px}
.cliente-item:hover{background:var(--cinza)}
.cliente-item:active{background:var(--verde-lt)}
.loader-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.7);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loader-modal.open{display:flex}
.spinner{width:40px;height:40px;border:4px solid var(--borda);border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.top-actions{max-width:1200px;margin:16px auto 0 auto;padding:0 16px;display:flex;gap:10px;justify-content:flex-end}
.btn-top{background:var(--branco);border:1px solid var(--borda);border-radius:6px;padding:8px 12px;font-size:12px;font-weight:bold;cursor:pointer;color:var(--texto);display:flex;align-items:center;gap:4px;transition:background 0.2s}
.btn-top:hover{background:var(--cinza)}

/* AJUSTE VISUAL: Estilos do Esqueleto Estrutural de Carregamento (Skeleton Loader) */
.skeleton-card {background:var(--branco);border:1px solid var(--borda);border-radius:8px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;height:240px}
@media(min-width:768px){.skeleton-card{height:290px}}
.skeleton-img {width:100%;height:120px;background:#e9e9e7;border-radius:6px;animation:skel-pulse 1.4s infinite ease-in-out}
@media(min-width:768px){.skeleton-img{height:160px}}
.skeleton-text {background:#e9e9e7;border-radius:4px;animation:skel-pulse 1.4s infinite ease-in-out}
@keyframes skel-pulse {0%{background-color:#e9e9e7}50%{background-color:#f5f5f3}100%{background-color:#e9e9e7}}
</style>
</head>

var CONDICOES = [
  "A VISTA",
  "30 DIAS",
  "30/60 DIAS",
  "30/60/90 DIAS",
  "45 DIAS",
  "60 DIAS"
];

window.onload = function() {
  var inpRepre = document.getElementById('repre-codigo');
  if (inpRepre && REPRE_SALVO) {
    inpRepre.value = REPRE_SALVO;
    var inpCart = document.getElementById('cart-repre');
    if (inpCart) inpCart.value = REPRE_SALVO;
  }
  renderizarCondicoes();
  carregarProdutos(false);
};

function salvarRepre() {
  var val = document.getElementById('repre-codigo').value.trim();
  localStorage.setItem('repre_codigo', val);
  REPRE_SALVO = val;
  var inpCart = document.getElementById('cart-repre');
  if (inpCart) inpCart.value = val;
}

function renderizarCondicoes() {
  var sel = document.getElementById('cart-condicao');
  if (!sel) return;
  sel.innerHTML = '<option value="">Selecione...</option>';
  CONDICOES.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
}

function selecionarCondicao(val) {
  CONDICAO_SELECIONADA = val;
}

function carregarProdutos(forcar) {
  var url = 'https://script.google.com/macros/s/AKfycbwG4O8T4xV8b9WwQ5b80pYJc8lS6jZq_L9xX4V0k9o/exec';
  if (forcar) {
    url += '?atualizar=true';
    document.getElementById('loading-modal').style.display = 'flex';
    document.getElementById('loading-modal').classList.add('open');
  }
  
  fetch(url)
    .then(res => res.json())
    .then(dados => {
      document.getElementById('loading-modal').classList.remove('open');
      document.getElementById('loading-modal').style.display = 'none';
      PRODUTOS_GLOBAL = dados;
      renderizarProdutos(dados);
    })
    .catch(err => {
      document.getElementById('loading-modal').classList.remove('open');
      document.getElementById('loading-modal').style.display = 'none';
      console.error(err);
      document.getElementById('produtos-grid').innerHTML = '<p style="grid-column:1/-1;text-align:center;color:red;padding:20px;">Falha ao carregar itens da planilha.</p>';
    });
}

function renderizarProdutos(lista) {
  var grid = document.getElementById('produtos-grid');
  grid.innerHTML = '';
  if (lista.length === 0) {
    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--sub);padding:20px;">Nenhum produto encontrado.</p>';
    return;
  }
  lista.forEach(function(p) {
    var badge = p.promocao ? '<div class="badge-promo">PROMOÇÃO</div>' : '';
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = badge +
      '<div class="card-img-wrapper">' +
        '<img src="' + p.imagem + '" class="card-img" alt="' + p.nome + '" loading="lazy" onerror="this.src=\'https://via.placeholder.com/150?text=Sem+Imagem\'">' +
      '</div>' +
      '<div class="card-info">' +
        '<div class="prod-cod">Cód: ' + p.codigo + '</div>' +
        '<div class="prod-nome" title="' + p.nome + '">' + p.nome + '</div>' +
        '<div class="prod-emb">' + p.embalagem + '</div>' +
        '<div class="prod-preco">R$ ' + p.preco.toFixed(2) + '</div>' +
        '<button class="btn-add" onclick="adicionarAoCarrinho(\'' + p.codigo + '\')">' +
          '<svg style="width:16px;height:16px;fill:currentColor" viewBox="0 0 24 24"><path d="M11 9h2V6h3V4h-3V1h-2v3H8v2h3v3zm-4 9c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2zm-8.9-5h7.45c.75 0 1.41-.41 1.75-1.03l3.86-7.01L19.42 4l-3.87 7H8.53L4.27 2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7l1.1-2z"/></svg>' +
          'Adicionar' +
        '</button>' +
      '</div>';
    grid.appendChild(card);
  });
}

function adicionarAoCarrinho(codigo) {
  if (!CARRINHO[codigo]) CARRINHO[codigo] = 0;
  CARRINHO[codigo]++;
  atualizarBadgeCarrinho();
  renderizarCarrinho();
}

function atualizarQtd(codigo, novaQtd) {
  if (novaQtd <= 0) { delete CARRINHO[codigo]; } else { CARRINHO[codigo] = novaQtd; }
  atualizarBadgeCarrinho();
  renderizarCarrinho();
}

function atualizarBadgeCarrinho() {
  var total = 0;
  for (var c in CARRINHO) { total += CARRINHO[c]; }
  document.getElementById('cart-badge').textContent = total;
}

function renderizarCarrinho() {
  var container = document.getElementById('carrinho-itens-lista');
  var totalVal = document.getElementById('cart-total-val');
  if (!container || !totalVal) return;
  container.innerHTML = '';
  
  var totalGeral = 0;
  var temItens = false;
  
  for (var cod in CARRINHO) {
    temItens = true;
    (function(codigo){
      var prod = PRODUTOS_GLOBAL.find(function(p){ return p.codigo === codigo; });
      if (!prod) return;
      var qtd = CARRINHO[codigo];
      var sub = prod.preco * qtd;
      totalGeral += sub;
      
      var item = document.createElement('div');
      item.className = 'carrinho-item';
      item.innerHTML = 
        '<div class="carrinho-item-info">' +
          '<div class="carrinho-item-nome">' + prod.nome + '</div>' +
          '<div class="carrinho-item-meta">Cód: ' + prod.codigo + ' | Un: R$ ' + prod.preco.toFixed(2) + '</div>' +
        '</div>' +
        '<div class="qtd-control">' +
          '<button class="btn-qtd" onclick="atualizarQtd(\''+codigo+'\','+(qtd-1)+')">-</button>' +
          '<div class="qtd-val">' + qtd + '</div>' +
          '<button class="btn-qtd" onclick="atualizarQtd(\''+codigo+'\','+(qtd+1)+')">+</button>' +
        '</div>';
      container.appendChild(item);
    })(cod);
  }
  if (!temItens) {
    container.innerHTML = '<p style="text-align:center;color:var(--sub);padding:10px 0;">Nenhum item adicionado.</p>';
  }
  totalVal.textContent = 'R$ ' + totalGeral.toFixed(2);
}

// AJUSTE: Nova intermediária de busca que aciona a tela de carregamento antes de processar o filtro
function acionarBuscaCliente() {
  var loader = document.getElementById('loading-modal');
  if (loader) {
    loader.style.display = 'flex';
    loader.classList.add('open');
  }
  
  // Timeout de 150ms garante que o navegador renderize o modal de carregamento na tela antes de rodar o filtro síncrono pesado
  setTimeout(function() {
    filtrarClientes();
    if (loader) {
      loader.classList.remove('open');
      loader.style.display = 'none';
    }
  }, 150);
}

function filtrarClientes() {
  var busca = document.getElementById('busca-cliente').value.toUpperCase();
  var divLista = document.getElementById('lista-clientes');
  divLista.innerHTML = '';
  
  var filtrados = CLIENTES.filter(function(c) {
    return c.codigo.toUpperCase().indexOf(busca) > -1 || c.nome.toUpperCase().indexOf(busca) > -1;
  });
  
  if (filtrados.length === 0) {
    divLista.innerHTML = '<p style="text-align:center;color:var(--sub);padding:10px;">Nenhum cliente encontrado.</p>';
    return;
  }
  
  filtrados.forEach(function(c) {
    var item = document.createElement('div');
    item.className = 'cliente-item';
    item.innerHTML = '<strong>' + c.codigo + '</strong> - ' + c.nome;
    item.onclick = function() { selecionarCliente(c); };
    divLista.appendChild(item);
  });
}

function selecionarCliente(c) {
  CLIENTE_SELECIONADO = c;
  var box = document.getElementById('box-cliente-sel');
  box.innerHTML = '<span>' + c.codigo + ' - ' + c.nome + '</span>' +
    '<svg style="width:16px;height:16px;fill:currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
  box.style.background = '#e1f5ee';
  box.style.borderColor = 'var(--verde)';
  fecharSheet();
}

function limSel() {
  CARRINHO = {};
  CLIENTE_SELECIONADO = null;
  CONDICAO_SELECIONADA = '';
  DADOS_PDF_PRONTO = null;
  
  var box = document.getElementById('box-cliente-sel');
  box.innerHTML = '<span>Selecionar Cliente...</span>' +
    '<svg style="width:16px;height:16px;fill:currentColor" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>';
  box.style.background = 'var(--verde-lt)';
  box.style.borderColor = 'var(--verde)';
  
  var selCond = document.getElementById('cart-condicao');
  if (selCond) selCond.value = '';
  
  atualizarBadgeCarrinho();
  renderizarCarrinho();
}

function enviarPedido(tipoAcao) {
  if (!REPRE_SALVO) { alert('Por favor, salve o código de representante no topo.'); return; }
  if (!CLIENTE_SELECIONADO) { alert('Por favor, selecione um cliente.'); return; }
  if (!CONDICAO_SELECIONADA) { alert('Por favor, selecione uma condição de pagamento.'); return; }
  
  var itensCart = [];
  var total = 0;
  for (var cod in CARRINHO) {
    var prod = PRODUTOS_GLOBAL.find(p => p.codigo === cod);
    if (prod) {
      var qtd = CARRINHO[cod];
      itensCart.push({ codigo: cod, nome: prod.nome, preco: prod.preco, qtd: qtd });
      total += prod.preco * qtd;
    }
  }
  if (itensCart.length === 0) { alert('Carrinho vazio.'); return; }

  var dados = {
    acao: 'salvarPedido',
    tipoAcao: tipoAcao,
    codigoRepre: REPRE_SALVO,
    clienteNome: CLIENTE_SELECIONADO.nome,
    clienteCodigo: CLIENTE_SELECIONADO.codigo,
    condicao: CONDICAO_SELECIONADA,
    itens: itensCart,
    total: total
  };

  document.getElementById('loading-modal').style.display = 'flex';
  document.getElementById('loading-modal').classList.add('open');

  var url = 'https://script.google.com/macros/s/AKfycbzVNtYScO4PKEJ_gpn8yIdKvaUaPSIew5RC6iU3K1Ju6S7sxmh0fqi6bIMj__MfbzDjgA/exec';

  fetch(url, {
    method: 'POST',
    body: JSON.stringify(dados)
  })
  .then(res => res.json())
  .then(res => {
    document.getElementById('loading-modal').classList.remove('open');
    document.getElementById('loading-modal').style.display = 'none';
    if (res.success) {
      DADOS_PDF_PRONTO = { tipoAcao: tipoAcao, base64: res.pdfBase64 };
      fecharCarrinho();
      
      if (tipoAcao === 'enviar') {
        document.getElementById('txt-sucesso-msg').innerText = "O pedido foi salvo e o e-mail com o PDF foi enviado.";
        var a = document.createElement('a');
        a.href = "data:application/pdf;base64," + res.pdfBase64;
        a.download = REPRE_SALVO + " - Pedido.pdf";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      } else {
        document.getElementById('txt-sucesso-msg').innerText = "Pedido enviado com sucesso para a Di Solle!";
      }
      
      document.getElementById('modal-sucesso').style.display = 'flex';
      document.getElementById('modal-sucesso').classList.add('open');
    } else { alert("Erro ao processar operação: " + res.message); }
  }).catch(err => {
    document.getElementById('loading-modal').classList.remove('open'); document.getElementById('loading-modal').style.display = 'none'; alert("Falha de rede.");
  });
}

function fecharModalSucesso() { 
  document.getElementById('modal-sucesso').classList.remove('open'); 
  setTimeout(()=>document.getElementById('modal-sucesso').style.display='none',300); 
  
  if (DADOS_PDF_PRONTO && DADOS_PDF_PRONTO.tipoAcao === 'enviar_disolle') {
    limSel(); 
  }
  
  fecharSheet(); 
}

function clicouForaSucesso(e) { if(e.target===document.getElementById('modal-sucesso')) fecharModalSucesso(); }
function abrirSheet() { document.getElementById('b-sheet').classList.add('open'); document.getElementById('sh-ov').classList.add('open'); document.getElementById('busca-cliente').value = ''; filtrarClientes(); }
function fecharSheet() { document.getElementById('b-sheet').classList.remove('open'); document.getElementById('sh-ov').classList.remove('open'); }
function abrirCarrinho() { document.getElementById('modal-carrinho').style.display='flex'; document.getElementById('modal-carrinho').classList.add('open'); }
function fecharCarrinho() { document.getElementById('modal-carrinho').classList.remove('open'); setTimeout(()=>document.getElementById('modal-carrinho').style.display='none',300); }
