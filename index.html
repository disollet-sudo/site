<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos Online</title>
    <style>
        /* CSS Embutido para simplificar, mas idealmente mova para um style.css no GitHub */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 40px; }
        .catalog-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 15px; text-align: center; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-image { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; background-color: #eee; }
        .product-title { font-size: 1.2em; margin: 15px 0 10px; color: #333; }
        .product-price { font-size: 1.5em; color: #2ecc71; font-weight: bold; margin-bottom: 10px; }
        .product-stock { font-size: 0.9em; color: #7f8c8d; margin-bottom: 15px; }
        .btn-buy { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1em; }
        .btn-buy:hover { background-color: #2980b9; }
        .btn-buy:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #loader { text-align: center; font-size: 1.2em; color: #666; }
        .error-message { color: #e74c3c; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Nosso Catálogo</h1>
        <p>Produtos atualizados em tempo real do Google Sheets</p>
    </header>

    <div id="loader">Carregando produtos...</div>
    <div id="catalog" class="catalog-container"></div>

    <script>
        // COLOQUE AQUI A URL DO SEU WEB APP DO APPS SCRIPT
        const API_URL = 'COLE_AQUI_A_URL_DO_SEU_WEB_APP';

        document.addEventListener('DOMContentLoaded', fetchProducts);

        async function fetchProducts() {
            const loader = document.getElementById('loader');
            const catalog = document.getElementById('catalog');

            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`Erro HTTP! Status: ${response.status}`);
                }

                const data = await response.json();
                
                // Limpa o loader
                loader.style.display = 'none';

                // Renderiza os produtos
                if (data.status === 'success' && data.products.length > 0) {
                    data.products.forEach(product => {
                        const card = createProductCard(product);
                        catalog.appendChild(card);
                    });
                } else {
                    catalog.innerHTML = '<p>Nenhum produto encontrado no momento.</p>';
                }

            } catch (error) {
                console.error("Erro ao buscar produtos:", error);
                loader.innerHTML = `<span class="error-message">Erro ao carregar o catálogo. Tente novamente mais tarde.</span>`;
            }
        }

        function createProductCard(product) {
            const div = document.createElement('div');
            div.className = 'product-card';
            
            // Lógica simples de estoque
            const inStock = product.estoque > 0;
            const stockText = inStock ? `${product.estoque} em estoque` : 'Esgotado';
            const buttonText = inStock ? 'Comprar' : 'Indisponível';
            const disabledAttr = inStock ? '' : 'disabled';

            // Formatação do preço (assumindo que vem como número do Sheets)
            const precoFormatado = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(product.preco);

            div.innerHTML = `
                <img src="${product.foto}" alt="${product.nome}" class="product-image" onerror="this.src='https://via.placeholder.com/200?text=Sem+Imagem'">
                <h2 class="product-title">${product.nome}</h2>
                <div class="product-price">${precoFormatado}</div>
                <div class="product-stock">${stockText}</div>
                <button class="btn-buy" ${disabledAttr} onclick="alert('Iniciando checkout para: ${product.nome}')">${buttonText}</button>
            `;
            return div;
        }
    </script>
</body>
</html>
